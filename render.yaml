services:
  - type: web
    name: resume-bot
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "export API_BASE_URL=http://127.0.0.1:$PORT && uvicorn main:app --host 0.0.0.0 --port $PORT & sleep 5 && python bot.py"
    envVars:
      - key: MISTRAL_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
